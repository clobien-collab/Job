<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>英語面接スクリプト読み上げアプリ</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans overflow-hidden">

  <!-- 音声合成非対応エラー画面 -->
  <div id="unsupported-screen" class="hidden flex-col items-center justify-center h-screen p-6 text-center">
    <h1 class="text-2xl font-bold mb-4">お使いのブラウザは音声合成に対応していません。</h1>
    <p>Chrome, Safari, Edgeなどの最新のブラウザをご利用ください。</p>
  </div>

  <!-- 開始画面 -->
  <div id="start-screen" class="flex flex-col items-center justify-center h-screen bg-gradient-to-br from-indigo-50 to-blue-100 p-6 text-center">
    <h1 class="text-3xl font-bold text-indigo-900 mb-6">英語面接 スクリプト練習</h1>
    <p class="mb-8 text-gray-600 max-w-md">
      画面をタップするごとに1文ずつ読み上げます。<br/>
      ご自身のペースで発音とスクリプトの内容を確認できます。
    </p>
    <button id="btn-start" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-10 rounded-full shadow-lg transform transition hover:scale-105 flex items-center gap-3">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
      練習をスタート
    </button>
  </div>

  <!-- メイン画面 -->
  <div id="main-screen" class="hidden flex-col h-screen relative overflow-hidden">
    <!-- ヘッダー -->
    <header class="bg-white shadow-sm z-20 relative">
      <div class="h-1.5 w-full bg-gray-200">
        <div id="progress-bar" class="h-full bg-indigo-600 transition-all duration-300" style="width: 0%;"></div>
      </div>
      <div class="flex justify-between items-center px-4 py-3">
        <div id="counter" class="text-sm font-semibold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full">1 / 100</div>
        <div id="section-name" class="text-sm font-bold text-gray-700 flex-1 text-center truncate px-2">セクション名</div>
        <div class="flex gap-2">
          <button id="btn-settings" class="p-2 text-gray-500 hover:bg-gray-100 rounded-full">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
          </button>
          <button id="btn-menu" class="p-2 text-gray-500 hover:bg-gray-100 rounded-full">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
          </button>
        </div>
      </div>
    </header>

    <!-- メインコンテンツ (タップエリア) -->
    <main class="flex-1 relative flex flex-col justify-center items-center px-6 overflow-hidden">
      <!-- 左右のタップゾーン -->
      <div id="tap-prev" class="absolute inset-y-0 left-0 w-1/3 z-10 cursor-pointer"></div>
      <div id="tap-next" class="absolute inset-y-0 right-0 w-2/3 z-10 cursor-pointer"></div>

      <!-- テキスト表示 -->
      <div class="w-full max-w-2xl mx-auto z-0 flex flex-col items-center select-none pointer-events-none">
        <div class="h-20 flex items-end justify-center mb-6 w-full opacity-40 transition-opacity">
          <p id="prev-text" class="text-sm text-gray-500 text-center line-clamp-2"></p>
        </div>
        <div class="min-h-[160px] flex items-center justify-center w-full">
          <p id="current-text" class="text-2xl md:text-3xl font-bold text-center leading-relaxed transition-all duration-300 text-gray-800"></p>
        </div>
        <div class="h-20 flex items-start justify-center mt-6 w-full opacity-40 transition-opacity">
          <p id="next-text" class="text-sm text-gray-500 text-center line-clamp-2"></p>
        </div>
      </div>

      <!-- タップのヒント -->
      <div class="absolute inset-x-0 bottom-24 flex justify-between px-8 text-xs text-gray-400 pointer-events-none opacity-50">
        <span>← Tap left to Previous</span>
        <span>Tap right to Next →</span>
      </div>
    </main>

    <!-- コントロールバー -->
    <div class="bg-white border-t border-gray-200 px-6 py-4 pb-8 z-20 relative shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
      <div class="max-w-md mx-auto flex items-center justify-between">
        <button id="btn-prev" class="p-3 text-gray-500 hover:text-indigo-600 disabled:opacity-30 rounded-full hover:bg-indigo-50 transition">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5"></line></svg>
        </button>
        <button id="btn-play-pause" class="p-4 rounded-full shadow-md text-white transition-transform active:scale-95 bg-indigo-500 hover:bg-indigo-600">
          <!-- アイコンはJSで切り替え -->
        </button>
        <button id="btn-next" class="p-3 text-gray-500 hover:text-indigo-600 disabled:opacity-30 rounded-full hover:bg-indigo-50 transition">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- 設定モーダル -->
  <div id="settings-modal" class="hidden absolute inset-0 bg-black bg-opacity-50 z-50 flex flex-col items-center justify-end sm:justify-center">
    <div class="bg-white w-full sm:w-96 rounded-t-2xl sm:rounded-2xl p-6 shadow-2xl transition-transform transform">
      <div class="flex justify-between items-center mb-6">
        <h3 class="text-lg font-bold flex items-center gap-2">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
          読み上げ設定
        </h3>
        <button id="close-settings" class="p-2 bg-gray-100 rounded-full">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-2 flex justify-between">
          <span>再生速度 (Rate)</span>
          <span id="rate-display" class="font-bold text-indigo-600">1.0x</span>
        </label>
        <input id="rate-slider" type="range" min="0.5" max="1.5" step="0.1" value="1.0" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
        <div class="flex justify-between text-xs text-gray-400 mt-1">
          <span>遅く</span><span>標準</span><span>速く</span>
        </div>
      </div>
      <div class="mb-2">
        <label class="block text-sm font-medium text-gray-700 mb-2">音声 (Voice)</label>
        <select id="voice-select" class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block p-2.5"></select>
      </div>
    </div>
  </div>

  <!-- 目次モーダル -->
  <div id="menu-modal" class="hidden absolute inset-0 bg-black bg-opacity-50 z-50 flex justify-end">
    <div class="bg-white w-4/5 max-w-sm h-full shadow-2xl flex flex-col">
      <div class="p-4 border-b border-gray-200 flex justify-between items-center bg-indigo-50">
        <h3 class="text-lg font-bold text-indigo-900 flex items-center gap-2">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
          目次
        </h3>
        <button id="close-menu" class="p-2 bg-white rounded-full text-gray-600 shadow-sm">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div id="menu-list" class="flex-1 overflow-y-auto p-2"></div>
    </div>
  </div>

  <!-- アプリのロジック -->
  <script>
    const scriptData = [
      { id: 0, section: "自己紹介（オープニング）", text: "Hi, thank you for the opportunity today." },
      { id: 1, section: "自己紹介（オープニング）", text: "I’ve spent 38 years at Fujitsu, where I worked on business transformation through technology." },
      { id: 2, section: "自己紹介（オープニング）", text: "In the past six years in particular, I’ve been leading initiatives to build data-driven marketing platforms using Salesforce, as well as driving business process re-engineering to improve decision-making across the organization." },
      { id: 3, section: "強み", text: "My biggest strength is my project management experience in enterprise environments for over 30 years." },
      { id: 4, section: "強み", text: "Based on that, I’m able to lead change management across multiple departments—especially in situations where there are conflicting interests—while also leveraging the latest marketing automation tools to maximize business outcomes." },
      { id: 5, section: "今後の希望", text: "At this stage of my career, I’m looking for an opportunity where I can contribute to sustainable business growth as a professional." },
      { id: 6, section: "今後の希望", text: "In the long term, I’m also considering becoming independent after the age of 65, so I’d like to continue building my expertise and experience in a challenging environment." },
      { id: 7, section: "コア・バリュー", text: "The value I bring is this: I turn strategy into execution by overcoming organizational barriers through strong project management, and I visualize results using data analytics." },
      { id: 8, section: "コア・バリュー", text: "By combining data with strong interpersonal skills, I help build sustainable revenue models." },
      { id: 9, section: "志望理由", text: "The reason I’m interested in this role is that I believe I can contribute in areas such as cross-functional coordination in complex organizations, and improving pipeline visibility in partner marketing." },
      { id: 10, section: "志望理由", text: "With my experience in channel business and my knowledge of marketing automation, I’m confident that I can contribute from day one." },
      { id: 11, section: "志望理由", text: "At the same time, I believe this role would give me valuable opportunities to further grow my skills and experience." },
      { id: 12, section: "弱み", text: "One area I would mention as a weakness is that I don’t have experience managing very large-scale system development projects." },
      { id: 13, section: "弱み", text: "The largest project I’ve handled was about 100 person-months, over roughly one and a half years, with a team of around six members." },
      { id: 14, section: "キャリアプラン", text: "Looking ahead, until around the age of 65, I’d like to further build my experience as a marketing and DX consultant in B2B and B2B2C domains, especially using Marketing Automation tools and AI." },
      { id: 15, section: "キャリアプラン", text: "More specifically, I’d like to strengthen my expertise in areas such as: Resolving product or service cannibalization and optimizing business portfolios from a marketing perspective." },
      { id: 16, section: "キャリアプラン", text: "Improving engagement by shifting from short-term campaign-driven marketing to mid- to long-term lead nurturing." },
      { id: 17, section: "キャリアプラン", text: "Utilizing AI to generate personas, scenarios, and content, and applying them to advanced account-based marketing strategies." },
      { id: 18, section: "キャリアプラン", text: "After 65, I plan to leverage my experience and network to work independently as a freelancer." },
      { id: 19, section: "転職理由", text: "The reason I’m considering a career change is that I feel my current environment doesn’t provide enough opportunities to fully pursue my career goals." },
      { id: 20, section: "転職理由", text: "So I’ve decided to take on a new challenge where I can continue to grow." },
      { id: 21, section: "Background", text: "Let me briefly walk you through my professional background and the kind of impact I’ve focused on throughout my career." },
      { id: 22, section: "Background", text: "I have three backgrounds." },
      { id: 23, section: "Background", text: "The first is marketing data analysis using Salesforce and other methods. By providing management metrics such as marketing activity performance visualization, customer behavior analysis, and ROI, we have built a data-driven nurturing system." },
      { id: 24, section: "Background", text: "The second is the promotion of cross-organizational BPR using the JQA evaluation framework. As a self-evaluator for the Japan Management Quality Council, I have contributed to the improvement of organizational processes, including clarifying organizational goals, identifying management issues, and selecting and implementing action items to be implemented." },
      { id: 25, section: "Background", text: "The third is channel strategy. It is responsible for expanding the channel business through the establishment of a partner ecosystem, the integration of information and EDI portal sites, and the development support activities of small and medium-sized enterprises." },
      { id: 26, section: "即戦力のアピール", text: "I have a long-term goal of becoming an independent marketing consultant by the time I’m 65." },
      { id: 27, section: "即戦力のアピール", text: "That’s why, instead of just relying on a company, I want to consistently deliver results as a professional and build a strong track record and network along the way." },
      { id: 28, section: "パターンA：Salesforce × 伴走型即戦力", text: "For example, I’d be a strong fit for mid-sized or growing companies that have implemented tools like Salesforce, but are struggling with alignment between sales and marketing, and haven’t been able to get full adoption in the field." },
      { id: 29, section: "パターンA：Salesforce × 伴走型即戦力", text: "In my case, I can leverage my experience at Fujitsu, especially my ability to coordinate across departments as a PMO, as well as my experience in data-driven process improvement." },
      { id: 30, section: "パターンA：Salesforce × 伴走型即戦力", text: "So rather than just configuring a system, I work closely with front-line teams, especially younger members, and make sure the tools are actually adopted and used effectively. I see myself as a hands-on partner who can drive real results." },
      { id: 31, section: "パターンB：外資系 × チャネル開拓", text: "Another example would be foreign companies that have great products but are struggling to establish a partner network or distributor channels in the Japanese market." },
      { id: 32, section: "パターンB：外資系 × チャネル開拓", text: "I believe I can add value there based on my experience at Fujitsu, where I worked on integrating and centralizing partner portal systems, as well as building structured training programs for new business development." },
      { id: 33, section: "パターンB：外資系 × チャネル開拓", text: "Beyond just generating direct sales leads, I can also leverage tools like Salesforce to engage partners and help scale the sales ecosystem in Japan." },
      { id: 34, section: "パターンC：サイロ化の解消（BPR）", text: "I’d also be a good match for companies where the organization has become siloed—for example, where marketing, sales, and development are not well aligned, leading to inefficiencies across the business." },
      { id: 35, section: "パターンC：サイロ化の解消（BPR）", text: "I spent over 13 years in a corporate planning role, where I led cross-functional business process improvements based on JQA assessments, and also managed projects that bridged sales and product development by turning customer complaints into product improvements." },
      { id: 36, section: "パターンC：サイロ化の解消（BPR）", text: "Because of that, I focus not just on introducing tools, but on aligning stakeholders and rebuilding the organization so it can operate in a more data-driven and integrated way across departments." },
      { id: 37, section: "Experience (Marketing)", text: "Let me briefly walk you through my professional background and the kind of impact I’ve focused on throughout my career." },
      { id: 38, section: "Experience (Marketing)", text: "I’ve spent my career working at the intersection of business strategy, marketing, and organizational transformation, with a strong focus on driving measurable results while changing mindsets and processes across organizations." },
      { id: 39, section: "Experience (Marketing)", text: "I'd like to share my experience of marketing data analysis." },
      { id: 40, section: "Experience (Marketing)", text: "A project where I led the establishment of a data-driven lead nurturing system combined with business process reform." },
      { id: 41, section: "Experience (Marketing)", text: "At the time, most business units were heavily focused on short-term lead acquisition volume. As a result, mass email campaigns were executed repeatedly with weak targeting, which created a negative cycle of declining engagement, particularly in click-through rates." },
      { id: 42, section: "Experience (Marketing)", text: "Rather than simply optimizing campaigns tactically, I addressed the root cause. I proposed a new approach that leveraged historical customer behavior data using Salesforce and marketing automation tools." },
      { id: 43, section: "Experience (Marketing)", text: "The objective was to identify “hot leads” based on concrete actions, rather than treating all leads equally." },
      { id: 44, section: "Experience (Marketing)", text: "We redesigned the process so that critical customer actions were scored and visualized, and only leads with a high likelihood of conversion were passed to Sales. This clarified the division of roles between Marketing and Sales and helped both functions focus on value, not volume." },
      { id: 45, section: "Experience (Marketing)", text: "As a result, we achieved approximately a one-percent year-over-year increase in email CTR. While that number may sound modest, the larger impact was organizational." },
      { id: 46, section: "Experience (Marketing)", text: "Stakeholders shifted their perspective from short-term acquisition to mid- and long-term customer development through structured nurturing. That mindset change significantly improved cross-team collaboration and decision-making quality." },
      { id: 47, section: "Experience (BPR)", text: "I'd like to share my experience of cross organizational BPR." },
      { id: 48, section: "Experience (BPR)", text: "I spent over a decade in corporate planning and business management, where I worked on promoting cross-organizational business process reform based on the JQA evaluation framework." },
      { id: 49, section: "Experience (BPR)", text: "The main challenge was strong departmental silos. Customer needs and complaints from the field were not effectively reflected in product development, which led to stagnating competitiveness." },
      { id: 50, section: "Experience (BPR)", text: "To address this, I introduced the JQA evaluation framework and conducted self-evaluates departments using objective, data-based criteria. This helped surface structural issues that were previously addressed only informally or subjectively." },
      { id: 51, section: "Experience (BPR)", text: "More importantly, I designed a feedback mechanism where customer insights triggered collaboration between Sales and Design or Development teams. Because this required cooperation across departments with different priorities, I played a coordination role—aligning interests, facilitating discussions, and ensuring that improvements translated into concrete actions at a company-wide level." },
      { id: 52, section: "Experience (BPR)", text: "Through this continuous improvement cycle, organizational processes were optimized, and the product under my responsibility achieved the number-one domestic market share for seven consecutive years. This experience reinforced my belief that sustainable competitive advantage comes not only from strategy, but from how effectively an organization learns and adapts." },
      { id: 53, section: "Experience (Early Career)", text: "Earlier in my career, I worked in web marketing and channel strategy, where I led a company-wide initiative to integrate and centralize sales channel websites." },
      { id: 54, section: "Experience (Early Career)", text: "At that time, around 80 websites were operated independently by various departments. This created high operational costs, inconsistent brand messaging, and a strong dependency on specific individuals, which increased operational risk." },
      { id: 55, section: "Experience (Early Career)", text: "There was significant resistance initially, so I focused heavily on change management. I first secured executive support by positioning the initiative as a way to maximize partner business revenue, rather than as a cost-cutting exercise. Then, at the operational level, I communicated clearly how each department would benefit—through reduced costs, standardized operations, and faster information updates." },
      { id: 56, section: "Experience (Early Career)", text: "Ultimately, we consolidated approximately 80 websites into 40, achieving a substantial reduction in operational costs and establishing a sustainable structure for delivering up-to-date, consistent information across channels." },
      { id: 57, section: "Experience (Conclusion)", text: "Across all these roles, my consistent focus has been on using data and structured processes to drive both results and behavioral change. I’m particularly motivated by environments that value long-term impact, cross-functional collaboration, and continuous improvement, which is why I’m very interested in opportunities within a global organization like yours." },
      { id: 58, section: "Q&A 1", text: "Q: What was the biggest pinch in the past when you felt that this might fail or that you were on fire? What specific actions did you take to put out the fire at that time?" },
      { id: 59, section: "Q&A 1", text: "A: I went to apologize to the customer due to a problem with the introduction system at the customer. At that time, I explained that I would raise the incident to the development department and respond to it at a later date." },
      { id: 60, section: "Q&A 1", text: "Q: Are there any episodes where you took on and solved a troublesome task that no one wanted to do or a problem that was neglected because it was difficult to solve?" },
      { id: 61, section: "Q&A 1", text: "A: We reduced the number of websites for partner companies by department and built a new portal site. We closed 40 of our 80 websites and integrated the remaining 40 into a newly launched portal site." },
      { id: 62, section: "Q&A 2", text: "Q: Do you have experience coordinating between departments with conflicting interests, such as sales, manufacturing, and administration? What did you do to convince both parties?" },
      { id: 63, section: "Q&A 2", text: "A: I took the initiative and sustained the effort, ultimately transforming the organizational culture. I regularly collected complaints and improvement requests from on-site sales related to products, requested solutions from related departments such as the development department, and fed back the answers to the sales." },
      { id: 64, section: "Q&A 2", text: "Q: Have you ever tried to persuade your boss or management to approve a new proposal or budget that was initially opposed? What logic and materials did you use?" },
      { id: 65, section: "Q&A 2", text: "A: At first, the upper management opposed the thick booklet for deciding on the system configuration into a PDF. Using my personal connections, I obtained an app for PDF conversion, which was not released in Japan at the time, and actually converted it myself to show it to prove its convenience for sales people." },
      { id: 66, section: "Q&A 3", text: "Q: Are there any cases where you have been involved in a case where 'work that was personalized' has been made into a manual and rule, and anyone can do it?" },
      { id: 67, section: "Q&A 3", text: "A: We decided to transfer the portal site for partners, which was initially personalized, and explained the transfer work step by step so that the previous operation procedures were incorporated into a document and the members of the transfer destination could take over the work sequentially." },
      { id: 68, section: "Q&A 3", text: "Q: How much have you reduced in terms of 'time' and 'cost' by replacing analog operations with digital ones, or by reducing unnecessary processes?" },
      { id: 69, section: "Q&A 3", text: "A: Until now, catalogs for customers, detailed explanatory materials, and product specification manuals for sales/SE have been digitized and posted on the web, which has reduced printing, transportation, and warehousing costs by 90 million yen per year." },
      { id: 70, section: "Q&A 4", text: "Q: Have you ever been approached by a customer who said, 'I'm consulting with you because it's you?' What do you think was the biggest factor in gaining customer trust at that time?" },
      { id: 71, section: "Q&A 4", text: "A: I was told by the partner sales that I could trust you because I was there. By steadily continuing the A3 initiatives mentioned above, a virtuous cycle of business was created, and as a result, we were able to take the first place in the domestic market." },
      { id: 72, section: "Q&A 4", text: "Q: What were your unique 'winning patterns' and 'ingenuity' in achieving your sales targets and finding new customers?" },
      { id: 73, section: "Q&A 4", text: "A: We invited authoritative lecturers in developing new customers and gathered and trained new development personnel in various sales departments. After that, they collected the knowledge and know-how they gained in the process of developing new products and shared them with the sales department." },
      { id: 74, section: "Q&A 5", text: "Q: What do you think the company values about you?" },
      { id: 75, section: "Q&A 5", text: "A: My past experience as a marketer, Salesforce operation ability, ability to extract marketing insights, and ability to take initiative in collaborating with overseas members." },
      { id: 76, section: "逆質問", text: "Is there someone currently in this position, or a predecessor? Or would this be starting completely from scratch?" },
      { id: 77, section: "逆質問", text: "What is the position of the person I would report to? Also, would I have any direct reports?" },
      { id: 78, section: "逆質問", text: "How many partners do you work with, and what industries or sectors are they typically in?" },
      { id: 79, section: "逆質問", text: "Are there any sales targets or predefined KPIs?" },
      { id: 80, section: "逆質問", text: "Would the role focus mainly on channel promotion, or would it also include responsibilities such as account management for each company, negotiating annual targets, and setting up incentive programs?" }
    ];

    // 状態管理
    let currentIndex = 0;
    let isPlaying = false;
    let rate = 1.0;
    let voices = [];
    let selectedVoiceURI = '';

    // DOM要素
    const elStartScreen = document.getElementById('start-screen');
    const elMainScreen = document.getElementById('main-screen');
    const elProgress = document.getElementById('progress-bar');
    const elCounter = document.getElementById('counter');
    const elSectionName = document.getElementById('section-name');
    const elPrevText = document.getElementById('prev-text');
    const elCurrentText = document.getElementById('current-text');
    const elNextText = document.getElementById('next-text');
    const btnPlayPause = document.getElementById('btn-play-pause');
    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');
    
    // アイコンSVG定数
    const iconPlay = '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>'; // Repeat Icon
    const iconPause = '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>'; // Pause Icon

    // ブラウザ対応チェック
    if (!('speechSynthesis' in window)) {
      document.getElementById('unsupported-screen').classList.remove('hidden');
      document.getElementById('unsupported-screen').classList.add('flex');
      elStartScreen.classList.add('hidden');
    }

    // 音声の読み込みとセレクトボックス設定
    function loadVoices() {
      const availableVoices = window.speechSynthesis.getVoices();
      voices = availableVoices.filter(v => v.lang.startsWith('en'));
      
      const select = document.getElementById('voice-select');
      select.innerHTML = '';
      voices.forEach((voice) => {
        const option = document.createElement('option');
        option.value = voice.voiceURI;
        option.textContent = `${voice.name} (${voice.lang})`;
        select.appendChild(option);
      });

      if (voices.length > 0 && !selectedVoiceURI) {
        const defaultVoice = voices.find(v => v.lang === 'en-US') || voices[0];
        selectedVoiceURI = defaultVoice.voiceURI;
        select.value = selectedVoiceURI;
      }
    }

    if (window.speechSynthesis.onvoiceschanged !== undefined) {
      window.speechSynthesis.onvoiceschanged = loadVoices;
    }

    // UIの更新
    function updateUI() {
      const item = scriptData[currentIndex];
      const progress = ((currentIndex + 1) / scriptData.length) * 100;
      
      elProgress.style.width = `${progress}%`;
      elCounter.textContent = `${currentIndex + 1} / ${scriptData.length}`;
      elSectionName.textContent = item.section;
      
      elPrevText.textContent = currentIndex > 0 ? scriptData[currentIndex - 1].text : '';
      elCurrentText.textContent = item.text;
      elNextText.textContent = currentIndex < scriptData.length - 1 ? scriptData[currentIndex + 1].text : '';
      
      // 再生中のスタイル変更
      if (isPlaying) {
        elCurrentText.classList.add('text-indigo-900');
        elCurrentText.classList.remove('text-gray-800');
        btnPlayPause.innerHTML = iconPause;
        btnPlayPause.classList.replace('bg-indigo-500', 'bg-red-500');
        btnPlayPause.classList.replace('hover:bg-indigo-600', 'hover:bg-red-600');
      } else {
        elCurrentText.classList.remove('text-indigo-900');
        elCurrentText.classList.add('text-gray-800');
        btnPlayPause.innerHTML = iconPlay;
        btnPlayPause.classList.replace('bg-red-500', 'bg-indigo-500');
        btnPlayPause.classList.replace('hover:bg-red-600', 'hover:bg-indigo-600');
      }
      
      // ボタンの有効・無効
      btnPrev.disabled = currentIndex === 0;
      btnPrev.style.opacity = currentIndex === 0 ? '0.3' : '1';
      btnNext.disabled = currentIndex === scriptData.length - 1;
      btnNext.style.opacity = currentIndex === scriptData.length - 1 ? '0.3' : '1';
    }

    // 音声再生
    function playCurrent() {
      window.speechSynthesis.cancel();
      const item = scriptData[currentIndex];
      if (!item || !item.text) return;
      
      const utterance = new SpeechSynthesisUtterance(item.text);
      utterance.lang = 'en-US';
      utterance.rate = rate;
      
      if (selectedVoiceURI) {
        const voice = voices.find(v => v.voiceURI === selectedVoiceURI);
        if (voice) {
          utterance.voice = voice;
        }
      }

      utterance.onstart = () => { isPlaying = true; updateUI(); };
      utterance.onend = () => { isPlaying = false; updateUI(); };
      utterance.onerror = () => { isPlaying = false; updateUI(); };
      
      window.speechSynthesis.speak(utterance);
    }

    // イベントリスナー: 開始
    document.getElementById('btn-start').addEventListener('click', () => {
      loadVoices(); // モバイル対応: ユーザージェスチャー内で明示的に呼び出し
      elStartScreen.classList.add('hidden');
      elMainScreen.classList.remove('hidden');
      elMainScreen.classList.add('flex');
      playCurrent();
      updateUI();
    });

    // イベントリスナー: 前へ・次へ (タップ領域＆ボタン)
    const handleNext = (e) => {
      e.stopPropagation();
      if (currentIndex < scriptData.length - 1) {
        currentIndex++;
        playCurrent();
        updateUI();
      }
    };
    const handlePrev = (e) => {
      e.stopPropagation();
      if (currentIndex > 0) {
        currentIndex--;
        playCurrent();
        updateUI();
      }
    };

    document.getElementById('tap-next').addEventListener('click', handleNext);
    document.getElementById('btn-next').addEventListener('click', handleNext);
    document.getElementById('tap-prev').addEventListener('click', handlePrev);
    document.getElementById('btn-prev').addEventListener('click', handlePrev);

    // イベントリスナー: 再生・一時停止
    btnPlayPause.addEventListener('click', (e) => {
      e.stopPropagation();
      if (isPlaying) {
        window.speechSynthesis.cancel();
        isPlaying = false;
        updateUI();
      } else {
        playCurrent();
      }
    });

    // 設定モーダル
    const modalSettings = document.getElementById('settings-modal');
    document.getElementById('btn-settings').addEventListener('click', () => {
      modalSettings.classList.remove('hidden');
    });
    document.getElementById('close-settings').addEventListener('click', () => {
      modalSettings.classList.add('hidden');
    });
    document.getElementById('rate-slider').addEventListener('input', (e) => {
      rate = parseFloat(e.target.value);
      document.getElementById('rate-display').textContent = rate.toFixed(1) + 'x';
    });
    document.getElementById('voice-select').addEventListener('change', (e) => {
      selectedVoiceURI = e.target.value;
    });

    // 目次モーダル
    const modalMenu = document.getElementById('menu-modal');
    const menuList = document.getElementById('menu-list');
    
    function renderMenu() {
      menuList.innerHTML = '';
      const sections = [...new Set(scriptData.map(item => item.section))];
      
      sections.forEach(secName => {
        const secDiv = document.createElement('div');
        secDiv.className = 'mb-4';
        secDiv.innerHTML = `<div class="px-3 py-1 bg-gray-100 text-xs font-bold text-gray-500 sticky top-0 uppercase tracking-wider">${secName}</div>`;
        
        const items = scriptData.filter(item => item.section === secName);
        items.forEach(item => {
          const isCurrent = currentIndex === item.id;
          const itemDiv = document.createElement('div');
          itemDiv.className = `p-3 border-b border-gray-100 text-sm cursor-pointer transition-colors ${isCurrent ? 'bg-indigo-100 text-indigo-900 font-bold border-l-4 border-l-indigo-600' : 'hover:bg-gray-50 text-gray-700'}`;
          itemDiv.innerHTML = `<div class="line-clamp-2">${item.text}</div>`;
          itemDiv.addEventListener('click', () => {
            currentIndex = item.id;
            modalMenu.classList.add('hidden');
            playCurrent();
            updateUI();
          });
          secDiv.appendChild(itemDiv);
        });
        menuList.appendChild(secDiv);
      });
    }

    document.getElementById('btn-menu').addEventListener('click', () => {
      renderMenu();
      modalMenu.classList.remove('hidden');
    });
    document.getElementById('close-menu').addEventListener('click', () => {
      modalMenu.classList.add('hidden');
    });

    // 初期化
    updateUI();

  </script>
</body>
</html>
