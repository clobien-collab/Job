<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>外資系企業 ターゲット求人チェッカー</title>
  
  <!-- Tailwind CSS (スタイリング用) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM (動作エンジン) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel (JSX変換用) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // アイコンのSVGコンポーネント
    const SearchIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;
    const BriefcaseIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 20V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/><rect width="20" height="14" x="2" y="6" rx="2"/></svg>;
    const BuildingIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="20" x="4" y="2" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></svg>;
    const LinkedinIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg>;
    const ChevronDownIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>;
    const ChevronUpIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m18 15-6-6-6 6"/></svg>;

    // 企業と職種のデータ
    const jobData = [
      {
        category: "1. SaaS・プラットフォームベンダー",
        description: "自社製品の導入定着や、大手顧客への戦略提案を担うポジションです。",
        companies: [
          { name: "Salesforce Japan", roles: ["Success Guide", "Success Architect"] },
          { name: "HubSpot Japan", roles: ["Customer Success Manager", "Implementation Specialist"] },
          { name: "Adobe Japan", roles: ["Marketo Engage Consultant", "Solution Architect"] },
          { name: "ServiceNow Japan", roles: ["Business Process Consultant", "Digital Transformation Advisor"] },
          { name: "Workday", roles: ["Enterprise Account Strategy", "Customer Success"] },
          { name: "Oracle Japan", roles: ["NetSuite Consultant", "Marketing Cloud Consultant"] },
          { name: "SAP Japan", roles: ["Strategic Management Consultant"] },
          { name: "Microsoft Japan", roles: ["Dynamics 365 Marketing Specialist"] }
        ]
      },
      {
        category: "2. 戦略・ITコンサルティングファーム",
        description: "顧客のDXプロジェクトに「PMO」や「マーケティング専門家」として参画する領域です。",
        companies: [
          { name: "Accenture", roles: ["Marketing Transformation Manager", "PMO Specialist"] },
          { name: "Deloitte Tohmatsu Consulting", roles: ["Customer Strategy", "Digital Marketing Consultant"] },
          { name: "PwC Consulting", roles: ["CX Strategy"] },
          { name: "EY Strategy and Consulting", roles: ["Business Transformation Consultant"] },
          { name: "KPMG Consulting", roles: ["Digital Customer Experience Manager"] }
        ]
      },
      {
        category: "3. エンタープライズIT・データ・AIソリューション",
        description: "B2Bの深耕営業やパートナー管理を支える重要な役割です。",
        companies: [
          { name: "AWS Japan", roles: ["Partner Success Manager", "Business Development"] },
          { name: "Google Cloud Japan", roles: ["Enterprise Marketing Manager", "Customer Program Manager"] },
          { name: "IBM Japan", roles: ["Digital Strategy Consultant", "Account Executive"] },
          { name: "Cisco Systems", roles: ["Partner Account Manager", "Digital Marketing lead"] },
          { name: "Treasure Data", roles: ["Solution Consultant", "Customer Success"] },
          { name: "Gartner Japan", roles: ["Executive Advisor", "Analyst"] },
          { name: "Braze", roles: ["Customer Success Manager"] }
        ]
      }
    ];

    function App() {
      // スマホ画面を考慮し、初期状態は1つ目だけ開いておく
      const [openCategories, setOpenCategories] = useState({
        0: true,
        1: false,
        2: false
      });

      const toggleCategory = (index) => {
        setOpenCategories(prev => ({
          ...prev,
          [index]: !prev[index]
        }));
      };

      const getGoogleJobsUrl = (company, role) => {
        const query = `${company} ${role} 求人 東京`;
        return `https://www.google.com/search?q=${encodeURIComponent(query)}&ibp=htl;jobs`;
      };

      const getLinkedInJobsUrl = (company, role) => {
        const query = `${company} ${role}`;
        return `https://www.linkedin.com/jobs/search/?keywords=${encodeURIComponent(query)}&location=Japan`;
      };

      return (
        <div className="min-h-screen p-3 sm:p-4 md:p-8 bg-slate-50">
          <div className="max-w-5xl mx-auto space-y-4 md:space-y-8">
            
            <header className="bg-white rounded-2xl shadow-sm p-5 md:p-8 border border-slate-200">
              <div className="flex items-center gap-3 md:gap-4 mb-3 md:mb-4">
                <div className="p-2 md:p-3 bg-blue-100 text-blue-700 rounded-lg flex items-center justify-center shrink-0">
                  <BriefcaseIcon />
                </div>
                <h1 className="text-xl md:text-3xl font-bold text-slate-900 leading-tight">外資系企業<br className="md:hidden" />ターゲット求人チェッカー</h1>
              </div>
              <p className="text-sm md:text-base text-slate-600 leading-relaxed">
                三村様のキャリアに合致する20社の推奨職種について、現在の募集状況をワンクリックで検索できます。<br className="hidden md:inline"/>
                各職種のボタンから、Google求人検索またはLinkedInの最新の募集状況にアクセスしてください。
              </p>
            </header>

            <div className="space-y-4 md:space-y-6">
              {jobData.map((categoryData, catIndex) => (
                <div key={catIndex} className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                  <button 
                    onClick={() => toggleCategory(catIndex)}
                    className="w-full flex items-center justify-between p-5 md:p-6 bg-slate-50 hover:bg-slate-100 transition-colors text-left"
                  >
                    <div>
                      <h2 className="text-xl font-bold text-slate-800">{categoryData.category}</h2>
                      <p className="text-sm text-slate-500 mt-1">{categoryData.description}</p>
                    </div>
                    <div className="text-slate-400">
                      {openCategories[catIndex] ? <ChevronUpIcon /> : <ChevronDownIcon />}
                    </div>
                  </button>

                  {openCategories[catIndex] && (
                    <div className="p-5 md:p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
                      {categoryData.companies.map((company, compIndex) => (
                        <div key={compIndex} className="bg-slate-50 rounded-xl p-5 border border-slate-100 hover:shadow-md transition-shadow">
                          <div className="flex items-center gap-2 mb-4">
                            <span className="text-slate-400 flex items-center justify-center">
                                <BuildingIcon />
                            </span>
                            <h3 className="text-lg font-bold text-slate-800">{company.name}</h3>
                          </div>
                          
                          <div className="space-y-4">
                            {company.roles.map((role, roleIndex) => (
                              <div key={roleIndex} className="space-y-3 border-t border-slate-200 pt-4 md:pt-3 first:border-0 first:pt-0">
                                <p className="font-medium text-slate-700 bg-white inline-block px-3 py-1 rounded-full text-sm shadow-sm border border-slate-200">
                                  {role}
                                </p>
                                <div className="flex flex-col sm:flex-row gap-2 sm:gap-3 mt-2">
                                  <a 
                                    href={getGoogleJobsUrl(company.name, role)} 
                                    target="_blank" 
                                    rel="noopener noreferrer"
                                    className="inline-flex items-center gap-2 px-4 py-3 sm:px-3 sm:py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm sm:text-xs font-medium rounded-xl sm:rounded-lg transition-colors flex-1 justify-center active:scale-95 shadow-sm"
                                  >
                                    <span className="flex items-center justify-center"><SearchIcon /></span>
                                    Google求人で確認
                                  </a>
                                  <a 
                                    href={getLinkedInJobsUrl(company.name, role)} 
                                    target="_blank" 
                                    rel="noopener noreferrer"
                                    className="inline-flex items-center gap-2 px-4 py-3 sm:px-3 sm:py-2 bg-[#0A66C2] hover:bg-[#004182] text-white text-sm sm:text-xs font-medium rounded-xl sm:rounded-lg transition-colors flex-1 justify-center active:scale-95 shadow-sm"
                                  >
                                    <span className="flex items-center justify-center"><LinkedinIcon /></span>
                                    LinkedInで確認
                                  </a>
                                </div>
                              </div>
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              ))}
            </div>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
